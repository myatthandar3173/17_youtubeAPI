<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>YoutubePlayer</title>
</head>

<body>

    <body>
        <!-- 1. The <iframe> (and video player) will replace this <div> tag. -->
        <!-- 1. ここの<div>タグがYoutubeの<iframe>に置き換わる。 -->
        <div id="player"></div>
        <form>
            <input type="search" id="ytSearch" value="TRiDENT" />
            <button id="searchBtn">検索</button>
        </form>
        <nav>
            <ul>
                <li id="doplay">再生</li>
                <li id="stop">
                    停止
                </li>
                <li id="pause">
                    一時停止</li>
                <li id="mute">Mute</li>
                <li id="back10s">
                    10秒戻る
                </li>
                <li id="forward10s">
                    10秒スキップ
                </li>
                <li>
                    <label>
                        volume
                        <input type="range" id="volume" min="0" max="100" value="50">
                        <span id="volumeNum"></span>
                    </label>
                </li>
                <li>
                    <select id="MovieId" class="ytMovie" name="ytMovie">
                        <option selected>選択してください。</option>
                    </select>
                </li>


                <label>
                    <input type="range" id="doSpeed" name="speed" min="0.25" max="2" value="1" step="0.1">
                    <span id="speedNum"></span>
                </label>
            </ul>
        </nav>


        <script>
            // 2. This code loads the IFrame Player API code asynchronously.
            // 2. 変数tagにscriptタグを作って入れる。Element=要素、Attrubute=属性
            var tag = document.createElement('script');

            tag.src = 'https://www.youtube.com/iframe_api';
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            // 3. This function creates an <iframe> (and YouTube player)
            //    after the API code downloads.
            // 3. APIのコードを読み込んでから、この関数を<iframe>内に影響させる。
            var player;
            let youtubeId = 'TPnJYJjo7Sw';
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('player', {
                    height: '360',
                    width: '640',
                    videoId: youtubeId,
                    playerVars: {
                        //③パラメータの設定
                        playsinline: 1,
                        controls: 0
                    },
                    events: {
                        onReady: onPlayerReady, //エラーで効かない。
                        // onStateChange: onPlayerStateChange
                    }
                });
            }

            // 4. The API will call this function when the video player is ready.
            // 4. このAPIは、video playderが準備でしたら、この関数を呼び出します。
            function onPlayerReady(event) {
                event.target.playVideo();
                let currentVol = 5;
                event.target.setVolume(currentVol);
                document.querySelector('#volume').value = currentVol;
                document.querySelector('#volumeNum').textContent = currentVol;
                stopVideo();
            }

            // 5. The API calls this function when the player's state changes.
            //    The function indicates that when playing a video (state=1),
            //    the player should play for six seconds and then stop.
            /* 5. video playerのステート（状態）が変更されたら、この関数を呼び出す。
          動画を再生するときの設定は、state=1にしておきます。
          プレイヤーは、6000ミリ秒後に終了します。 */
            var done = false;
            function onPlayerStateChange(event) {
                if (event.data == YT.PlayerState.PLAYING && !done) {
                    setTimeout(stopVideo, 6000);
                    done = true;
                }
            }
            //停止関数
            function stopVideo() {
                player.stopVideo();
            }

            let stopBtn = document.getElementById('stop');
            stopBtn.addEventListener('click', function () {
                stopVideo();
            })


            //play the video
            function playTheVideo() {
                player.playVideo();
            }

            let doplayBtn = document.getElementById('doplay');
            doplayBtn.addEventListener("click", function () {
                playTheVideo();
            })

            //pause the video
            function pauseTheVideo() {
                player.pauseVideo();
            }
            let pauseBtn = document.getElementById('pause');
            pauseBtn.addEventListener("click", function () {
                pauseTheVideo();
            })

            //mute the video
            function muteTheVideo() {
                if (player.isMuted()) {
                    player.unMute();
                } else {
                    player.mute();
                }
            }
            let muteBtn = document.getElementById('mute');
            muteBtn.addEventListener("click", function () {
                muteTheVideo();
                if (player.isMuted()) {
                    muteBtn.textContent = "UnMute";
                } else {
                    muteBtn.textContent = "Mute";
                }
            })

            //back 10s
            function back10s() {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime - 10, true);
            }
            let back10sBtn = document.getElementById('back10s');
            back10sBtn.addEventListener("click", function () {
                back10s();
            })

            //forward 10s
            function forward10s() {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 10, true);
            }
            let forward10sBtn = document.getElementById('forward10s');
            forward10sBtn.addEventListener("click", function () {
                forward10s();
            })

            //volume control
            function volumeFn(vol) {
                let currentVol = player.getVolume();
                player.setVolume(vol);
            }
            let volumeBtn = document.getElementById('volume');
            let volumeTxt = document.querySelector('#volumeNum');
            volumeBtn.addEventListener("input", function () {
                let vol = volumeBtn.value;
                volumeTxt.textContent = vol;
                volumeFn(vol);
            })

            //movie change
            function changeMovie(movieId) {
                player.loadVideoById(movieId);
            }
            let movieSelect = document.getElementById('MovieId');
            movieSelect.addEventListener("change", function () {
                let movieId = movieSelect.value;
                if (movieId !== "選択してください。") {
                    changeMovie(movieId);
                }
            })

            let movieid = document.querySelector('#MovieId');
            movieid.addEventListener('change', function () {
                youtubeId = movieid.value;
                //プレイヤー削除
                player.destroy();
                onYouTubeIframeAPIReady();
            });



            // function playSpeed(num) {
            //     //setPlaybackRateが再生スピードをセットするメソッド
            //     console.log(num);
            //     player.setPlaybackRate(num);
            //     player.playVideo();
            // }

            // //再生スピードイベント
            // let speedBtn = document.querySelector('#doSpeed');
            // speedBtn.addEventListener('change', function () {
            //     //数値でないと効かないので、文字列から数値に変換
            //     playSpeed(parseFloat(speedBtn.speed.value));
            // });

            function playSpeed(num) {
                player.setPlaybackRate(num);
            }
            let speedBtn = document.querySelector('#doSpeed');
            speedBtn.addEventListener('change', function () {
                playSpeed(parseFloat(speedBtn.speed.value));
            })

            let speedTxt = document.querySelector('#speedNum');
            speedBtn.addEventListener('input', function () {
                let speed = speedBtn.value;
                speedTxt.textContent = speed;
            })

        </script>

        <script>
            const USE_LOCAL = true; // 開発中はtrue、本番APIを叩きたいときはfalse
            const selectvideo = document.querySelector(".ytMovie");

            const ytSearch = function (val) {
                const key = 'AIzaSyBtpCDNdFsQxj29wmDEeR2nT3ShVraM0lA'; //自分のキーに書き換えます。
                const num = 10;
                const part = 'snippet';
                const type = 'video';
                const query = val;
                const apiUrl = `https://www.googleapis.com/youtube/v3/search?type=${type}&part=${part}&maxResults=${num}&key=${key}&q=${query}&playsinline=1`;

                const localUrl = './data/sample.json';

                fetch(USE_LOCAL ? localUrl : apiUrl)
                    .then((data) => data.json())
                    .then((obj) => {
                        for (let movie of obj["items"]) {
                            //各videoIdとタイトルを取得
                            // console.log(movie["id"]["videoId"]);
                            // console.log(movie["snippet"]["title"]);
                            const ytId = movie["id"]["videoId"];
                            const ytTitle = movie["snippet"]["title"];
                            //optionを作成して、videoIdとtitleを所定の場所に設置し、要素を追加していく。
                            const optionTag = document.createElement('option');
                            optionTag.textContent = ytTitle;
                            optionTag.setAttribute('value', ytId);
                            selectvideo.appendChild(optionTag);
                        }
                    });
            }


            const ytSearchBtn = document.querySelector('#searchBtn');
            ytSearchBtn.addEventListener('click', function (e) {
                const ytSearchVal = document.querySelector('#ytSearch').value;
                console.log(ytSearchVal); //検索フォームの値を取得

                e.preventDefault(); //検索ボタンの送信をストップしておく。


                ytSearch(ytSearchVal);
            });


        </script>

    </body>

</html>
